<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Chronelia | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #7979be;
      --btn-bg: rgba(255,255,255,0.15);
      --btn-border: rgba(255,255,255,0.25);
      --btn-text: #ffffff;
      --radius: 28px;
      --gap: 14px;
    }

    html, body {
      height: 100%;
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      cursor: url('assets/cursor.png'), auto;
    }

    a, button, [role="link"], [role="button"], input, label, select {
      cursor: url('assets/cursor_click.png'), pointer !important;
    }

    /* Layer 1 — blurred fill */
    .bg-blur {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-blur video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(20px) brightness(0.5);
      transform: scale(1.15);
    }

    /* Layer 2 — portrait video, full visible, no crop */
    .bg-portrait {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .bg-portrait video {
      height: 100%;
      width: auto;
      max-width: 100%;
    }

    /* Slight tint over portrait video so text readable */
    .bg-portrait::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    /* Layer PC — full cover, hidden on mobile */
    .bg-pc {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg-pc video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bg-tint {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    @media (min-width: 769px) {
      .bg-blur    { display: none; }
      .bg-portrait { display: none; }
      .bg-pc      { display: block; }
    }

    /* Main layout */
    .page {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 580px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 96px var(--gap) 64px;
    }

    /* Avatar */
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
    }

    /* Name */
    .profile-name {
      font-size: 2.5rem;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    /* Social icons row */
    .socials {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-bottom: 28px;
    }
    .social-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 8px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: transform 0.15s;
      text-decoration: none;
    }
    .social-btn:hover { transform: scale(1.075); }
    .social-btn svg { width: 32px; height: 32px; fill: currentColor; }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    .link-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 64px;
      padding: 12px 64px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: var(--btn-text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      line-height: 1.2;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 0 8px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .link-btn:hover { background: rgba(255,255,255,0.25); }
    .link-btn:active { transform: scale(0.98); }

    .link-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .link-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .link-label {
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
      word-break: break-word;
    }


    @media (max-width: 768px) {
      .container {
        max-width: min(100%, calc(100svh * 9 / 16 - 40px));
      }
    }

    @media (min-width: 576px) {
      .container { padding-top: 80px; }
      .page { padding-top: 40px; }
      .link-btn { font-size: 16px; }
      .link-label { font-size: 16px; }
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #loading-screen img {
      width: 200px;
      height: 200px;
      object-fit: contain;
    }
    .loading-text {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #333333;
      letter-spacing: 0.05em;
    }
    .dot {
      opacity: 0;
      animation: dot-appear 1.5s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.5s; }
    .dot:nth-child(3) { animation-delay: 1s; }
    @keyframes dot-appear {
      0%, 20% { opacity: 0; }
      50%      { opacity: 1; }
      100%     { opacity: 0; }
    }
  </style>
</head>
